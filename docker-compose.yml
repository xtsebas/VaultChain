version: '3.9'

services:
  db:
    image: postgres:15
    container_name: vaultchain_db
    environment:
      POSTGRES_DB: vaultchain_db
      POSTGRES_USER: vaultchain_user
      POSTGRES_PASSWORD: vaultchain_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultchain_user -d vaultchain_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: vaultchain_backend
    environment:
      DEBUG: "1"
      DATABASE_URL: postgresql://vaultchain_user:vaultchain_password@db:5432/vaultchain_db
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:22
    container_name: vaultchain_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
