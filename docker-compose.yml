version: '3.9'

services:
  db:
    image: postgres:15
    container_name: vaultchain_db
    environment:
      POSTGRES_DB: vaultchain_db
      POSTGRES_USER: vaultchain_user
      POSTGRES_PASSWORD: vaultchain_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: .
    container_name: vaultchain_backend
    environment:
      DEBUG: "1"
      DATABASE_URL: postgresql://vaultchain_user:vaultchain_password@db:5432/vaultchain_db
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    image: node:22
    container_name: vaultchain_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data: